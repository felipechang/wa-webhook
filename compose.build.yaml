services:
  app:
    container_name: wa-webhook
    build: .
    ports:
      - "${WA_WEBHOOK_PORT}:5000"
    volumes:
      - auth:/app/.wwebjs_auth
      - cache:/app/.wwebjs_cache

  postgres:
    image: postgres
    container_name: wa-webhook-db
    restart: always
    expose:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  auth:
  cache:
  db-data: