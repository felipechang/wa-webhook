services:
  wa-webhook:
    container_name: wa-webhook
    image: canicaperu/wa-webhook-app
    ports:
      - "${WA_WEBHOOK_PORT}:5000"
    volumes:
      - auth:/app/.wwebjs_auth
      - cache:/app/.wwebjs_cache
    depends_on:
      wa-webhook-db:
        condition: service_healthy

  wa-webhook-db:
    image: postgres:14-alpine
    container_name: wa-webhook-db
    restart: always
    expose:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auth:
  cache:
  db-data: